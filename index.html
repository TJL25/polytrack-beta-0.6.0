<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <title>PolyTrack 0.6.0</title>
    
    <script>
      window.polytrackModConfiguration = { unblocked: true };
    </script>

    <style>
      body { margin: 0; background-color: #000; overflow: hidden; }
      #unity-container { width: 100vw; height: 100vh; }
      #unity-canvas { width: 100%; height: 100%; background: #231f20; }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas"></canvas>
    </div>

    <script src="UnityLoader.js"></script>
    <script>
      // NOTE: If your file is named something else (like webgl.json), 
      // change "polytrack.json" below to match it exactly.
      var unityInstance = UnityLoader.instantiate("unity-canvas", "polytrack.json");
    </script>
  </body>
</html>
